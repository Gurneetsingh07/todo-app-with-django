{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" />
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Font Awesome 5 Brands:wght@400&display=swap" />
    <script src="https://kit.fontawesome.com/your-fontawesome-kit-id.js" crossorigin="anonymous"></script>
    <title>Sign Up</title>
</head>
<body>
    <div class="signup-login">
        <div class="signup-box">
            <form method="post">
                {% csrf_token %}
                <div class="heading">Sign Up</div>
                <div class="line"></div>
                <div class="field">
                <b>Username</b>
                <input type="text" required class="inp" name="username" placeholder="Enter your username">
            </div>
            <div class="field">
                <b>Email</b>
                <input type="email" required class="inp" name="email" placeholder="Enter your email">
                </div>
            <div class="field">
                <b>Password</b>
                <input type="password" required class="inp" name="password" placeholder="Enter your password">
            </div>
            <div class="field">
                <input type="submit" value="Sign Up" class="submit-button">
            </div>
            </form>
            <div class="field footer">
                <b>Already have an account?</b>
                <br>
                <a class="login-link" href="/login">Login</a>
            </div>
        </div>
    </div>
</body>
</html>
