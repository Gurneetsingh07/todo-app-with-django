{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" />
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <title>Todo App</title>
</head>
<body>
    <div class="signup-login">
        

        <div class="TodoWrapper">
            <div><h1>Hello {{ user.username }}</h1></div>
            <form method="post">
                {% csrf_token %}
                <div class="heading">Get Things Done</div>
                <div class="anca"><a href="/signout" class="sign"><i class="fa-solid fa-right-from-bracket"></i></a></div>
                
                <input type="text" class="todo-input" name="title" required placeholder="Add today task">
                <input type="submit" value="Add Task" class="todo-btn">
            </form>
            <div class="scr">
            {% for todo in res %}
            <div class="Todo">
                <h5>{{ todo.id }}</h5>
                <p>{{ todo.title }}</p>
                <div>
                    <a href="{% url 'edit_todo' todo.id %}"><i class="fa-solid fa-pen-to-square"></i></a>
                    <a href="{% url 'delete_todo' todo.id %}"><i class="fa-solid fa-trash"></i></a>
                </div>
            </div>
            {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
